name: API flask C.I # nome que aparece no github
on: [push] # quando o github vai rodar o workflow, nesse caso quando houver um push
jobs:
  testes:
    runs-on: ubuntu-latest # sistema operacional que o github vai rodar o workflow
    steps:
      - uses: actions/checkout@v2 # faz o checkout do repositório
      - name: Set up Python 3.8 # nome da etapa
        uses: actions/setup-python@v2 # ação do github para configurar o python
        with:
          python-version: 3.8 # versão do python
      - name: Install dependencies # nome da etapa
        run: |
          python -m pip install --upgrade pip # atualiza o pip
          pip install -r requirements.txt # instala as dependências do projeto
      - name: Run tests # nome da etapa
        run: |
          pytest --maxfail=1 --disable-warnings -q # roda os testes com pytest, parando no primeiro erro e desabilitando warnings